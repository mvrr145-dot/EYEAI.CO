<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
background:black;
color:white;
font-family:sans-serif;
text-align:center;
margin:0;
}

h1{
font-size:42px;
margin-top:20px;
letter-spacing:4px;
}

button{
padding:12px 20px;
margin:8px;
border:none;
border-radius:20px;
background:#00f0ff;
color:black;
font-weight:bold;
}

model-viewer{
width:100%;
height:75vh;
}

</style>

</head>

<body>

<h1>EYEAI.CO</h1>

<button onclick="robot1()">META AI</button>
<button onclick="robot2()">NEURON X</button>
<button onclick="robot3()">OMEGA BOT</button>
<button onclick="robot4()">ZENTRA</button>

<model-viewer
id="viewer"
src="robot1.glb"
ar
ar-modes="scene-viewer webxr quick-look"
camera-controls
auto-rotate>
</model-viewer>

<script>

function robot1(){

document.getElementById("viewer").src="robot1.glb"

}

function robot2(){

document.getElementById("viewer").src="robot2.glb"

}

function robot3(){

document.getElementById("viewer").src="robot3.glb"

}

function robot4(){

document.getElementById("viewer").src="robot4.glb"

}

</script>

</body>

</html>
