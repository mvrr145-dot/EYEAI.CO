<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>
body{background:black;color:white;text-align:center;font-family:sans-serif;margin:0}
h1{margin-top:20px;letter-spacing:4px}
button{padding:10px 15px;margin:6px;border:0;border-radius:20px;background:#00f0ff;font-weight:bold}
model-viewer{width:100%;height:75vh}
</style>

</head>

<body>

<h1>EYEAI.CO</h1>

<button onclick="set('https://modelviewer.dev/shared-assets/models/Astronaut.glb','https://modelviewer.dev/shared-assets/models/Astronaut.usdz')">META AI</button>

<button onclick="set('https://modelviewer.dev/shared-assets/models/RobotExpressive.glb','https://modelviewer.dev/shared-assets/models/RobotExpressive.usdz')">NEURON X</button>

<button onclick="set('https://modelviewer.dev/shared-assets/models/NeilArmstrong.glb','https://modelviewer.dev/shared-assets/models/NeilArmstrong.usdz')">OMEGA BOT</button>

<button onclick="set('https://modelviewer.dev/shared-assets/models/Chair.glb','')">ZENTRA</button>

<model-viewer id="v"
src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
ios-src="https://modelviewer.dev/shared-assets/models/Astronaut.usdz"
ar
ar-modes="scene-viewer webxr quick-look"
camera-controls
auto-rotate>
</model-viewer>

<script>

function set(a,b){
v.src=a
if(b){v.setAttribute("ios-src",b)}else{v.removeAttribute("ios-src")}
}

</script>

</body>
</html>
