<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
background:black;
color:white;
font-family:sans-serif;
text-align:center;
margin:0;
}

h1{
font-size:40px;
margin-top:20px;
}

button{
padding:12px 18px;
margin:8px;
border:none;
border-radius:20px;
background:#00eaff;
color:black;
font-weight:bold;
}

model-viewer{
width:100%;
height:75vh;
}

</style>

</head>

<body>

<h1>EYEAI.CO</h1>

<button onclick="meta()">META AI (AR)</button>
<button onclick="neuron()">NEURON X (AR)</button>
<button onclick="omega()">OMEGA BOT</button>
<button onclick="zentra()">ZENTRA</button>

<model-viewer
id="viewer"
src="https://modelviewer.dev/shared-assets/models/RobotExpressive.glb"
ar
camera-controls
auto-rotate>
</model-viewer>

<script>

function meta(){

viewer.src="https://modelviewer.dev/shared-assets/models/RobotExpressive.glb"

viewer.setAttribute("ar","")

}

function neuron(){

viewer.src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"

viewer.setAttribute("ar","")

}

function omega(){

viewer.src="https://modelviewer.dev/shared-assets/models/NeilArmstrong.glb"

viewer.removeAttribute("ar")

}

function zentra(){

viewer.src="https://modelviewer.dev/shared-assets/models/RobotExpressive.glb"

viewer.removeAttribute("ar")

}

</script>

</body>

</html>
